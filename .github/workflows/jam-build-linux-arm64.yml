name: jam Build Linux arm64

# Builds OUR bun-webkit-linux-arm64.tar.gz from this fork and publishes it as a
# release asset that the jam runtime can consume by repointing vendor/jsc/VENDOR.json.
#
# Upstream builds linux-arm64 on a NATIVE arm64 runner (`linux-arm64-gh`, Bun's
# fleet). On a free GitHub-hosted amd64 `ubuntu-latest` there is no native arm64
# runner, so this builds linux/arm64 under QEMU emulation. The build RECIPE — the
# upstream `Dockerfile` — is reused UNMODIFIED (it is already multi-arch via
# TARGETARCH/BUILDPLATFORM). release.sh derives its arch from `uname -m`, so it
# can't target arm64 from an amd64 host; the buildx invocation below is byte-for
# -byte the one release.sh runs (same Dockerfile, target, args), only with
# --platform=linux/arm64 and the arm64 MARCH_FLAG release.sh itself selects for
# arm64. Mirrors build-reusable.yml's plain `bun-webkit-linux-arm64` Release lane.
#
# Emulated arm64 codegen is slow (well within the 350-min cap), but produces the
# same static JSCOnly artifact.

on:
  workflow_dispatch:
    inputs:
      build_ref:
        description: "Git ref to build (commit SHA, branch, or tag)"
        type: string
        required: false
        default: ""

permissions:
  contents: write

jobs:
  linux-arm64:
    name: Linux arm64 (emulated on amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Resolve build ref
        id: ref
        run: |
          if [ -n "${{ inputs.build_ref }}" ]; then
            echo "ref=${{ inputs.build_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 1

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build bun-webkit-linux-arm64
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          set -euxo pipefail
          rm -rf "${{ runner.temp }}/bun-webkit" "${{ runner.temp }}/bun-webkit.tar.gz"

          # Same buildx command release.sh runs, pinned to linux/arm64 with the
          # arm64 MARCH_FLAG release.sh itself uses for that arch. Dockerfile is
          # reused unmodified (multi-arch via TARGETARCH/BUILDPLATFORM).
          docker buildx build \
            -f Dockerfile \
            -t bun-webkit-linux-arm64 \
            --build-arg ENABLE_SANITIZERS="" \
            --build-arg LTO_FLAG="" \
            --build-arg MARCH_FLAG="-march=armv8-a+crc -mtune=ampere1" \
            --build-arg RELEASE_FLAGS="-O3 -DNDEBUG=1" \
            --build-arg WEBKIT_RELEASE_TYPE="Release" \
            --build-arg CPU="native" \
            --progress=plain \
            --platform=linux/arm64 \
            --target=artifact \
            --output type=local,dest="${{ runner.temp }}/bun-webkit" \
            .

          cd "${{ runner.temp }}"
          echo "#define BUN_WEBKIT_VERSION \"${{ steps.ref.outputs.ref }}\"" \
            >> bun-webkit/include/cmakeconfig.h
          echo '{ "name": "bun-webkit-linux-arm64", "version": "0.0.1-${{ steps.ref.outputs.ref }}", "os": ["linux"], "cpu": ["arm64"], "repository": "https://github.com/${{ github.repository }}" }' \
            > bun-webkit/package.json

          rm -rf bun-webkit/lib/*.so bun-webkit/lib/*.so.*

          test -f bun-webkit/lib/libJavaScriptCore.a
          test -f bun-webkit/lib/libWTF.a
          test -f bun-webkit/lib/libbmalloc.a
          test -f bun-webkit/lib/libicui18n.a
          test -f bun-webkit/lib/libicuuc.a
          test -f bun-webkit/lib/libicudata.a
          test -f bun-webkit/include/JavaScriptCore/JavaScript.h
          test -f bun-webkit/include/cmakeconfig.h

          tar -czf bun-webkit-linux-arm64.tar.gz bun-webkit

      - uses: actions/upload-artifact@v4
        with:
          name: bun-webkit-linux-arm64
          path: ${{ runner.temp }}/bun-webkit-linux-arm64.tar.gz

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          TAG="autobuild-${{ steps.ref.outputs.ref }}"
          ASSET="${{ runner.temp }}/bun-webkit-linux-arm64.tar.gz"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" \
              --notes "Automated bun-webkit build for ${{ steps.ref.outputs.ref }}" \
              --target "${{ steps.ref.outputs.ref }}"
          fi
          gh release upload "$TAG" "$ASSET" --clobber
