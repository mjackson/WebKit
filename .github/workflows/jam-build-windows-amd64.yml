name: jam Build Windows amd64

# Builds OUR bun-webkit-windows-amd64.tar.gz from this fork and publishes it as a
# release asset that the jam runtime can consume by repointing vendor/jsc/VENDOR.json.
# Reuses the upstream cross-compile recipe (windows-cross-release.sh +
# Dockerfile.windows: clang-cl --target + an xwin-downloaded MSVC CRT/Windows SDK +
# lld-link) UNMODIFIED, so the toolchain stays pinned/identical to oven-sh's and the
# fork stays mergeable with upstream. Cross-compiled from Linux, so it runs on the
# free amd64 ubuntu-latest host with no emulation. Mirrors build-reusable.yml's plain
# `bun-webkit-windows-amd64` Release lane (Release, no LTO, no baseline, no ASAN).

on:
  workflow_dispatch:
    inputs:
      build_ref:
        description: "Git ref to build (commit SHA, branch, or tag)"
        type: string
        required: false
        default: ""

permissions:
  contents: write

jobs:
  windows-amd64:
    name: Windows amd64 (cross-compiled from Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Resolve build ref
        id: ref
        run: |
          if [ -n "${{ inputs.build_ref }}" ]; then
            echo "ref=${{ inputs.build_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 1

      - uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build bun-webkit-windows-amd64
        run: |
          set -euxo pipefail
          rm -rf "${{ runner.temp }}/bun-webkit" "${{ runner.temp }}/bun-webkit.tar.gz"
          WIN_ARCH="x64" \
          WEBKIT_RELEASE_TYPE="Release" \
          LTO_FLAG="" \
          BASELINE="" \
          ENABLE_SANITIZERS="" \
          temp="${{ runner.temp }}" \
          bash windows-cross-release.sh

          cd "${{ runner.temp }}"
          echo "#define BUN_WEBKIT_VERSION \"${{ steps.ref.outputs.ref }}\"" \
            >> bun-webkit/include/cmakeconfig.h
          echo '{ "name": "bun-webkit-windows-amd64", "version": "0.0.1-${{ steps.ref.outputs.ref }}", "os": ["windows"], "cpu": ["x64"], "repository": "https://github.com/${{ github.repository }}" }' \
            > bun-webkit/package.json

          # Sanity-check the layout jam's WebKitConfig::from_prefix + webkit_libraries()
          # validate for windows: the JSCOnly static libs and the static ICU (sicu*).
          ls -la bun-webkit/lib
          test -f bun-webkit/lib/JavaScriptCore.lib
          test -f bun-webkit/lib/WTF.lib
          test -f bun-webkit/lib/bmalloc.lib
          test -f bun-webkit/lib/sicuin.lib
          test -f bun-webkit/lib/sicuuc.lib
          test -f bun-webkit/lib/sicudt.lib
          test -f bun-webkit/include/JavaScriptCore/JavaScript.h
          test -f bun-webkit/include/cmakeconfig.h

          tar -czf bun-webkit-windows-amd64.tar.gz bun-webkit

      - uses: actions/upload-artifact@v4
        with:
          name: bun-webkit-windows-amd64
          path: ${{ runner.temp }}/bun-webkit-windows-amd64.tar.gz

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          TAG="autobuild-${{ steps.ref.outputs.ref }}"
          ASSET="${{ runner.temp }}/bun-webkit-windows-amd64.tar.gz"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" \
              --notes "Automated bun-webkit build for ${{ steps.ref.outputs.ref }}" \
              --target "${{ steps.ref.outputs.ref }}"
          fi
          gh release upload "$TAG" "$ASSET" --clobber
