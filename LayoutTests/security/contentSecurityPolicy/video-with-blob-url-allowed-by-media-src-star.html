<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Security-Policy" content="media-src *">
<script src="../../media/media-file.js"></script>
<script>
if (window.testRunner) {
    testRunner.dumpAsText();
    testRunner.waitUntilDone();
}

var fileInput;

function testPassed()
{
    document.getElementById("result").textContent = "PASS: Video with blob URL loaded successfully under media-src *.";
    if (window.testRunner)
        testRunner.notifyDone();
}

function testFailed()
{
    document.getElementById("result").textContent = "FAIL: Video with blob URL was blocked by CSP.";
    if (window.testRunner)
        testRunner.notifyDone();
}

function loadVideo(event)
{
    var video = document.createElement("video");
    video.onloadedmetadata = testPassed;
    video.onerror = testFailed;
    video.src = window.URL.createObjectURL(event.target.files[0]);

    document.body.removeChild(fileInput);
    document.body.appendChild(video);
}

function runTest()
{
    if (!window.eventSender)
        return;

    var x = fileInput.offsetLeft + fileInput.offsetWidth / 2;
    var y = fileInput.offsetTop + fileInput.offsetHeight / 2;

    eventSender.beginDragWithFiles(["../../media/" + findMediaFile("video", "content/test")]);
    eventSender.mouseMoveTo(x, y);
    eventSender.mouseUp();
}

window.onload = function ()
{
    fileInput = document.getElementById("file");
    fileInput.onchange = loadVideo;
    runTest();
}
</script>
</head>
<body>
<p>This tests that loading a video with a blob URL is allowed when the page has Content Security Policy "media-src *". To run this test by hand, select a video file.</p>
<div id="result"></div>
<input type="file" id="file">
</body>
</html>
