<!DOCTYPE html>
<html>
<script src="/js-test-resources/js-test.js"></script>
<body>
<script>
function completeURL(path = "", fragment = "")
{
    var url = `${location.protocol}//${location.host}/`;
    if (path)
        url += path;
    if (fragment)
        url += "?" + fragment;
    return url;
}

description("Tests history.replaceState(), history.pushState() from a sandboxed iframe");

shouldNotThrow('window.history.replaceState(null, "New title", location.href)');
shouldNotThrow('window.history.pushState(null, "New title", location.href)');

shouldNotThrow('window.history.replaceState(null, "New title", completeURL(""))');

shouldNotThrow('window.history.pushState(null, "New title", completeURL(""))');

shouldNotThrow('window.history.replaceState(null, "New title", completeURL("dummy"))');

shouldNotThrow('window.history.pushState(null, "New title", completeURL("dummy"))');

shouldNotThrow('window.history.replaceState(null, "New title", completeURL("", "dummy"))');

shouldNotThrow('window.history.pushState(null, "New title", completeURL("", "dummy"))');
</script>
</body>
</html>
